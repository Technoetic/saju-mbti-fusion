name: CI/CD — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test (engine + web modules load)
        run: |
          python -c "from web.server import app; print('FastAPI app routes:', len(app.routes))"
          python -c "from engine.divination.face_reading import generate_face_reading; print('face_reading loaded')"
          python -c "from engine.saju import pillars, luck_cycle, ten_gods; print('saju engine loaded')"

      - name: Pytest (if test files present)
        run: |
          if compgen -G "web/test_*.py" > /dev/null || compgen -G "engine/**/test_*.py" > /dev/null; then
            pip install pytest
            pytest -x --tb=short web/ engine/ 2>&1 | tail -50 || echo "pytest had issues (non-blocking for now)"
          else
            echo "no test files yet — skipping"
          fi
        shell: bash

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          bash <(curl -fsSL railway.com/install.sh) -y
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Verify Railway auth
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway whoami
          railway --version

      - name: Deploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway up \
            --project 585d6fb2-3438-48eb-9010-5b291a7f1fa1 \
            --service saju-mbti-fusion \
            --environment production \
            --detach

      - name: Wait for new deployment SUCCESS
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          # 라이브 HTTP 200만 보면 거짓 양성 발생 (이전 배포가 살아있어 늘 200).
          # 새 배포의 latestDeployment.status가 SUCCESS인지 직접 확인.
          PROJECT_ID="585d6fb2-3438-48eb-9010-5b291a7f1fa1"
          ENV_ID="36ecbd1d-b0f0-4683-a4b5-d125ab37cb94"
          SERVICE_ID="00fbc238-ae49-4db6-8548-b4bf3478a7c8"
          for i in $(seq 1 18); do
            sleep 15
            RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"query D(\$id: String!, \$envId: String!) { project(id: \$id) { services { edges { node { id name serviceInstances { edges { node { environmentId latestDeployment { id status } } } } } } } } }\",\"variables\":{\"id\":\"$PROJECT_ID\",\"envId\":\"$ENV_ID\"}}")
            STATUS=$(echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for s in d.get('data',{}).get('project',{}).get('services',{}).get('edges',[]):
              for inst in s['node']['serviceInstances']['edges']:
                  n = inst['node']
                  if n['environmentId'] == '$ENV_ID' and s['node']['id'] == '$SERVICE_ID':
                      ld = n.get('latestDeployment') or {}
                      print(ld.get('status','UNKNOWN'))
                      break
          " 2>/dev/null || echo "PARSE_ERROR")
            echo "attempt $i: latest deployment status = $STATUS"
            case "$STATUS" in
              SUCCESS)
                code=$(curl -s -o /dev/null -w "%{http_code}" https://saju-mbti-fusion-production.up.railway.app/)
                if [ "$code" = "200" ]; then
                  echo "✅ New deployment SUCCESS + live HTTP 200"
                  exit 0
                fi
                echo "  ↳ deployment SUCCESS but HTTP=$code, waiting routing…"
                ;;
              FAILED|CRASHED|REMOVED)
                echo "❌ Deployment $STATUS — failing CI"
                exit 1
                ;;
              *)
                # BUILDING / DEPLOYING / INITIALIZING / QUEUED — keep waiting
                ;;
            esac
          done
          echo "❌ New deployment did not reach SUCCESS within 270s"
          exit 1
