[pytest]
# ADR-046 회귀 + smoke 테스트 설정
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 기본 옵션
addopts =
    --strict-markers
    --tb=short
    --color=yes

# 마커
markers =
    regression: front 외부 모듈 로딩 + window 노출 검증 (Playwright)
    smoke: 백엔드 import + 데이터 로드 smoke
    live: Railway 라이브 서버 호출 (CI 외)
